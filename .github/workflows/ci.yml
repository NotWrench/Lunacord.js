name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install
      - run: bun run build --filter='./packages/*'
      - run: bun run typecheck

  test-bun:
    name: Test (Bun, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install
      - run: bun run build --filter='./packages/*'
      - run: bun run test

  test-node:
    name: Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        node: [ "22", "24" ]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: bun install
      - run: bun run build --filter='./packages/*'
      - name: Run core smoke test under Node
        run: node -e "const fs=require('node:fs'); const path=require('node:path');
          const file=path.resolve('dist/index.js'); if(!fs.existsSync(file))
          throw new Error('Missing dist/index.js'); const
          content=fs.readFileSync(file,'utf8'); if(!content.includes('export {
          Lunacord')) throw new Error('Missing Lunacord export in
          dist/index.js');"
        working-directory: packages/core
