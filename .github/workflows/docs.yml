name: Deploy docs (Vercel)

on:
  push:
    branches: [main, master]
    paths:
      - "apps/docs/**"
      - "packages/core/**"
      - "packages/discordjs/**"
      - "packages/plugins/**"
      - ".github/workflows/docs.yml"
      - "turbo.json"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Verify docs build (workspace)
        run: bunx turbo run build --filter=@lunacord/docs

      # Project "Root Directory" in Vercel should be `apps/docs` (matches this cwd).
      - name: Deploy production to Vercel
        working-directory: apps/docs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: bunx vercel@latest deploy --prod --yes
