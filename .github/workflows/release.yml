name: Release

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      # registry-url makes setup-node write ~/.npmrc using NODE_AUTH_TOKEN (not NPM_TOKEN alone).
      # scope ensures auth applies to @lunacord/*; unscoped lunacord.js still uses the same registry token.
      #
      # NPM_TOKEN must be an npm "Automation" token (granular access → Automation) so publish does not
      # require 2FA/OTP in CI (EOTP). Classic publish tokens + account 2FA will fail with EOTP.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@lunacord"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build --filter='./packages/*'

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Required for npm/changesets publish after setup-node registry-url (otherwise PUTs are anonymous → E404).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
